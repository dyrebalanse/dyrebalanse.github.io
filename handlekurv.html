<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handlekurv | Dyrebalanse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <h1><a href="index.html">Dyrebalanse</a></h1>
      <p>Naturlig støtte for hundens helse</p>
    </div>

    <nav class="menu">
      <a href="index.html">Hjem</a>
      <a href="immunstotte.html">Immunstøtte</a>
      <a href="ledd.html">Ledd</a>
      <a href="tarm.html">Tarmhelse</a>
      <a href="eldre-dyr.html">Eldre dyr</a>
      <a href="butikk.html" aria-current="page">Nettbutikk</a>
    </nav>
  </header>

  <main class="container">
    <section>
      <div class="checkout-box">
        <h2>Din handlekurv</h2>
        <div id="cartItems" class="cart-items"></div>
        <h3 id="totalPrice">Totalt: 0 kr</h3>

        <label for="paymentMethod">Betalingsmetode</label>
        <select id="paymentMethod">
          <option value="stripe">Kortbetaling (Stripe Checkout)</option>
          <option value="vipps">Vipps (betalingslenke)</option>
        </select>

        <button type="button" id="checkoutButton" class="button">Gå til betaling</button>
        <button type="button" id="clearCartButton">Tøm handlekurv</button>
        <p id="checkoutMessage" class="status-text"></p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 Dyrebalanse</p>
    <p>Informasjonen på siden erstatter ikke veterinærbehandling.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
